<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Study Plan Generator</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header class="topbar">
    <img src="{{ url_for('static', filename='favicon.png') }}" class="logo">
    <h1>AI Study Planner</h1>
  </header>

  <section class="card">
    <h2>Generate Your Smart Study Plan</h2>

    <form method="post" action="/generate">

      <label>Subjects (comma separated)</label>
      <input name="subjects" type="text" placeholder="e.g., Python, Machine Learning" required>

      <label>Number of days</label>
      <input name="days" type="number" value="7" min="1" max="90" required>

      <label>Hours per day</label>
      <input name="hours" type="number" value="2" min="0.5" step="0.5" required>

      <button class="btn" type="submit">🚀 Generate Plan</button>
    </form>

    <p class="hint">Tip: For faster output, try 3 days & 2 hours/day.</p>
  </section>

</body>
</html>
